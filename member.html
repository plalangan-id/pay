<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P-PAY | MEMBER DASHBOARD</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f0f0f;
      --card-bg: #1a1a1a;
      --primary-orange: #ff6b00;
      --accent-orange: #cc5500;
      --text-white: #ffffff;
      --text-gray: #a0a0a0;
      --green: #2ecc71;
    }

    body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-white); margin: 0; padding: 15px; }
    .container { max-width: 450px; margin: 0 auto; }
    
    .header { text-align: left; margin-bottom: 25px; padding: 10px 5px; }
    .header h1 { font-family: 'JetBrains Mono', monospace; color: var(--primary-orange); margin: 0; font-size: 22px; letter-spacing: -1px; }

    .balance-card {
      background: linear-gradient(135deg, var(--primary-orange) 0%, var(--accent-orange) 100%);
      padding: 25px; border-radius: 20px; position: relative; overflow: hidden;
      box-shadow: 0 15px 35px rgba(255,107,0,0.25);
    }

    .id-tag {
      font-family: 'JetBrains Mono', monospace; background: rgba(0,0,0,0.2);
      padding: 8px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
      text-align: right; color: white;
    }

    .info-list { margin-top: 25px; display: grid; gap: 12px; }
    .info-item { 
      background: var(--card-bg); padding: 15px; border-radius: 15px; 
      border: 1px solid #222; display: flex; justify-content: space-between; align-items: center;
    }
    
    .label-tegas { font-size: 10px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
    .val-tegas { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--text-white); }

    .login-box { background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid #333; margin-top: 50px; text-align: center; }
    input { 
      width: 100%; padding: 15px; margin: 15px 0; background: #252525; border: 1px solid #444; 
      color: white; border-radius: 10px; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; font-size: 18px; text-align: center;
    }
    button { 
      width: 100%; padding: 15px; background: var(--primary-orange); color: white; 
      border: none; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 14px; letter-spacing: 1px;
    }
    
    /* Style Tombol Bayar Wifi */
    .btn-action {
      background: white; color: var(--primary-orange); margin-top: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 2px solid white;
    }
    .btn-action:disabled { background: #666; color: #999; border-color: #666; }
  </style>
</head>
<body>

<div class="container" id="loginArea">
  <div class="login-box">
    <h1 style="color: var(--primary-orange); font-family: 'JetBrains Mono';">P-PAY ACCESS</h1>
    <p style="font-size: 12px; color: #666;">Masukkan ID Member Plalangan.net</p>
    <input type="text" id="memberId" placeholder="IDM-000">
    <button onclick="loginMember()">MASUK SEKARANG</button>
  </div>
</div>

<div class="container" id="dashboardArea" style="display: none;">
  <div class="header">
    <h1>PLALANGAN.NET PAY</h1>
  </div>

  <div class="balance-card">
    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
      <div>
        <div class="label-tegas" style="color: rgba(255,255,255,0.8);">Nama Member</div>
        <div id="userNama" style="font-size: 22px; font-weight: 800; color: white;">---</div>
      </div>
      <div class="id-tag">
        <div style="font-size: 11px;">ID: <span id="userIdDisplay">---</span></div>
        <div style="font-size: 10px; margin-top: 5px; opacity: 0.9; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 4px;">AKTIF: <span id="userAktivasi">--/--/--</span></div>
      </div>
    </div>

    <div style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px;">
      <div class="label-tegas" style="color: rgba(255,255,255,0.9);">Saldo Deposit</div>
      <div id="userSaldo" style="font-size: 42px; font-weight: 800; color: white;">Rp 0</div>
    </div>

    <button id="btnBayar" class="btn-action" onclick="konfirmasiBayar()">
      ⚡ BAYAR WIFI SEKARANG
    </button>
  </div>

  <div class="info-list">
    <div class="info-item">
      <span class="label-tegas">Jatuh Tempo</span>
      <span class="val-tegas" id="userTempo">--/--/--</span>
    </div>
    <div class="info-item">
      <span class="label-tegas">Status Layanan</span>
      <span id="userStatus" style="font-size: 12px; font-weight: 800; padding: 4px 10px; border-radius: 5px;">---</span>
    </div>
  </div>

  <button onclick="location.reload()" style="margin-top: 30px; background: #222; font-size: 11px; opacity: 0.5;">LOGOUT SYSTEM</button>
</div>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxAI1kCnsU38M0VN0-ZB0O5xDYHmmorGkGuqLBotaf-1YT3M4_94CdqI6pm-soEYO5u1g/exec";

  // Fungsi Pembersihan Tanggal
  const bersihkanTgl = (tglMentah) => {
    if (!tglMentah || tglMentah === "---") return "---";
    const d = new Date(tglMentah);
    if (!isNaN(d.getTime())) {
      const tgl = String(d.getDate()).padStart(2, '0');
      const bln = String(d.getMonth() + 1).padStart(2, '0');
      const thn = d.getFullYear();
      return `${tgl}/${bln}/${thn}`;
    }
    return tglMentah;
  };

  async function loginMember() {
    const id = document.getElementById('memberId').value.toUpperCase();
    if(!id) return alert("ID Kosong!");
    document.querySelector('button').innerText = "MENYAMBUNGKAN...";

    try {
      const response = await fetch(`${WEB_APP_URL}?action=GET_DATA&id=${id}`);
      const res = await response.json();

      if(res.success) {
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('dashboardArea').style.display = 'block';
        
        document.getElementById('userNama').innerText = res.data.nama;
        document.getElementById('userIdDisplay').innerText = id;
        document.getElementById('userAktivasi').innerText = bersihkanTgl(res.data.aktivasi);
        document.getElementById('userTempo').innerText = bersihkanTgl(res.data.tempo);
        document.getElementById('userSaldo').innerText = "Rp " + res.data.saldo.toLocaleString('id-ID');
        
        const statusEl = document.getElementById('userStatus');
        statusEl.innerText = res.data.status;
        statusEl.style.backgroundColor = res.data.status === 'AKTIF' ? 'rgba(46, 204, 113, 0.2)' : 'rgba(231, 76, 60, 0.2)';
        statusEl.style.color = res.data.status === 'AKTIF' ? '#2ecc71' : '#e74c3c';
      } else {
        alert("ID Member Tidak Valid!");
        location.reload();
      }
    } catch(e) {
      alert("Gangguan Jaringan!");
      location.reload();
    }
  }

  // LOGIKA BAYAR WIFI MANDIRI
  async function konfirmasiBayar() {
    const id = document.getElementById('userIdDisplay').innerText;
    const nama = document.getElementById('userNama').innerText;
    const saldoTxt = document.getElementById('userSaldo').innerText;
    const saldoSekarang = parseInt(saldoTxt.replace(/[^0-9]/g, ''));
    
    // Sesuaikan harga paket bulanan di sini (Contoh: 150000)
    const hargaPaket = 150000; 

    if (saldoSekarang < hargaPaket) {
      return alert("Gagal: Saldo Anda tidak cukup!");
    }

    const yakin = confirm(`Halo ${nama}, gunakan Rp ${hargaPaket.toLocaleString('id-ID')} untuk bayar Wifi bulan ini?`);
    
    if (yakin) {
      const btn = document.getElementById('btnBayar');
      btn.innerText = "SEDANG MEMPROSES...";
      btn.disabled = true;

      try {
        const resp = await fetch(WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "POTONG",
            idMember: id,
            nominal: hargaPaket,
            keterangan: "BAYAR WIFI MANDIRI (APP)"
          })
        });

        const hasil = await resp.text();
        if (hasil === "Sukses") {
          alert("PEMBAYARAN BERHASIL! Saldo telah terpotong.");
          location.reload();
        } else {
          alert("Gagal: " + hasil);
          btn.innerText = "⚡ BAYAR WIFI SEKARANG";
          btn.disabled = false;
        }
      } catch (e) {
        alert("Gagal terhubung ke server!");
        btn.disabled = false;
      }
    }
  }
</script>
</body>
</html>
